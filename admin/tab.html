<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasmota Devices</title>
    <style>
        :root {
            --primary: #ff6d00;
            --primary-dark: #e65100;
            --accent: #1976d2;
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #212121;
            --text-secondary: #757575;
            --border: #e0e0e0;
            --success: #388e3c;
            --warning: #f57c00;
            --danger: #d32f2f;
            --on-color: #388e3c;
            --off-color: #757575;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,.1);
        }
        body.dark {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --text-secondary: #9e9e9e;
            --border: #333333;
            --shadow: 0 2px 8px rgba(0,0,0,.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }

        /* ── TOOLBAR ── */
        #toolbar {
            background: var(--primary);
            color: #fff;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 2px 4px rgba(0,0,0,.3);
        }
        #toolbar .logo { font-size: 18px; font-weight: 500; white-space: nowrap; }
        #toolbar .spacer { flex: 1; }
        #connStatus {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        #connStatus .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #9e9e9e;
            display: inline-block;
        }
        #connStatus.online .dot  { background: #69f0ae; }
        #connStatus.offline .dot { background: #ef5350; }
        .btn-toolbar {
            background: rgba(255,255,255,.2);
            color: #fff;
            border: 1px solid rgba(255,255,255,.5);
            border-radius: 4px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background .2s;
        }
        .btn-toolbar:hover { background: rgba(255,255,255,.35); }

        /* ── MAIN ── */
        #main { padding: 16px; }

        /* ── DEVICE SELECTOR ── */
        #deviceSelectorArea {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        #deviceSelectorArea label {
            font-weight: 500;
            white-space: nowrap;
        }
        #deviceSelect {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--card-bg);
            color: var(--text);
            font-size: 14px;
            min-width: 200px;
            cursor: pointer;
        }
        .online-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .online-badge.online  { background: #e8f5e9; color: #2e7d32; }
        .online-badge.offline { background: #ffebee; color: #c62828; }
        body.dark .online-badge.online  { background: #1b3a1f; color: #69f0ae; }
        body.dark .online-badge.offline { background: #3e1010; color: #ff8a80; }

        /* ── PLACEHOLDER ── */
        #placeholder {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* ── CHANNEL CARDS ── */
        .channel-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 14px;
        }
        .channel-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        /* ── STATE TABLE ── */
        .states-table {
            width: 100%;
            border-collapse: collapse;
        }
        .states-table thead th {
            padding: 8px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }
        .states-table tbody tr:not(:last-child) td {
            border-bottom: 1px solid var(--border);
        }
        .states-table tbody tr:hover { background: rgba(0,0,0,.03); }
        body.dark .states-table tbody tr:hover { background: rgba(255,255,255,.04); }
        .states-table td {
            padding: 8px 16px;
            vertical-align: middle;
        }
        .td-key {
            font-family: monospace;
            font-size: 13px;
            color: var(--text);
            word-break: break-all;
        }
        .td-val {
            font-size: 13px;
            color: var(--text-secondary);
            word-break: break-all;
        }
        .td-act {
            white-space: nowrap;
            width: 1%;
        }
        .no-states {
            padding: 14px 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ── POWER BUTTONS ── */
        .power-toggle { display: flex; gap: 4px; }
        .btn-power {
            padding: 4px 16px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s;
        }
        .btn-power.on  { background: var(--on-color);  color: #fff; }
        .btn-power.off { background: var(--off-color); color: #fff; }
        .btn-power.active-on  { box-shadow: 0 0 0 2px var(--on-color),  0 0 0 4px white; }
        .btn-power.active-off { box-shadow: 0 0 0 2px var(--off-color), 0 0 0 4px white; }
        body.dark .btn-power.active-on  { box-shadow: 0 0 0 2px var(--on-color),  0 0 0 4px #1e1e1e; }
        body.dark .btn-power.active-off { box-shadow: 0 0 0 2px var(--off-color), 0 0 0 4px #1e1e1e; }
        .btn-power:hover { opacity: .8; }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #323232;
            color: #fff;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            transition: transform .3s;
            z-index: 9999;
            pointer-events: none;
        }
        #toast.show  { transform: translateX(-50%) translateY(0); }
        #toast.error { background: var(--danger); }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            #main { padding: 10px; }
            .states-table thead { display: none; }
            .states-table td { display: block; padding: 4px 16px; }
            .td-key { font-weight: 600; padding-top: 10px; }
            .td-act { padding-bottom: 10px; }
        }
    </style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
    <div class="logo">🏠 Tasmota</div>
    <div class="spacer"></div>
    <button class="btn-toolbar" onclick="refreshAll()" data-i18n="aktualisieren">⟳ Refresh</button>
    <button class="btn-toolbar" id="btnConfig" onclick="openConfig()" data-i18n="konfiguration">⚙ Configuration</button>
    <div id="connStatus">
        <span class="dot"></span><span id="connLabel" data-i18n="verbinde">Connecting…</span>
    </div>
</div>

<!-- MAIN -->
<div id="main">

    <!-- DEVICE SELECTOR -->
    <div id="deviceSelectorArea">
        <label for="deviceSelect" data-i18n="geraet">Device:</label>
        <select id="deviceSelect" onchange="onDeviceSelect()">
            <option value="" data-i18n="geraetAuswaehlen">-- Select device --</option>
        </select>
        <span id="deviceStatusBadge" class="online-badge" style="display:none"></span>
    </div>

    <!-- PLACEHOLDER (shown when no device is selected or no devices found) -->
    <div id="placeholder" data-i18n="geraetWaehlen">Please select a device from the list.</div>

    <!-- DEVICE DETAIL PANEL -->
    <div id="deviceDetail" style="display:none">

        <!-- cmnd channel section -->
        <div class="channel-card">
            <div class="channel-header">📤 <span data-i18n="cmndTitel">Commands (cmnd)</span></div>
            <table class="states-table" id="cmndTable">
                <thead>
                    <tr>
                        <th data-i18n="schluessel">Key</th>
                        <th data-i18n="wert">Value</th>
                        <th data-i18n="aktionen">Actions</th>
                    </tr>
                </thead>
                <tbody id="cmndBody"></tbody>
            </table>
            <div class="no-states" id="cmndEmpty" style="display:none" data-i18n="keineStaten">No states found.</div>
        </div>

        <!-- stat channel section -->
        <div class="channel-card">
            <div class="channel-header">📥 <span data-i18n="statTitel">Status (stat)</span></div>
            <table class="states-table" id="statTable">
                <thead>
                    <tr>
                        <th data-i18n="schluessel">Key</th>
                        <th data-i18n="wert">Value</th>
                    </tr>
                </thead>
                <tbody id="statBody"></tbody>
            </table>
            <div class="no-states" id="statEmpty" style="display:none" data-i18n="keineStaten">No states found.</div>
        </div>

    </div><!-- /#deviceDetail -->

</div><!-- /#main -->

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ================================================================
 * Tasmota – Admin Tab  (Device Detail View)
 * ================================================================ */
'use strict';

// ── i18n ──────────────────────────────────────────────────────────

const TRANSLATIONS = {
    de: {
        verbinde:           'Verbinde…',
        verbunden:          'Verbunden',
        getrennt:           'Getrennt',
        socketFehler:       'Socket nicht verfügbar',
        authFehler:         'Authentifizierung fehlgeschlagen',
        aktualisieren:      '⟳ Aktualisieren',
        konfiguration:      '⚙ Konfiguration',
        geraet:             'Gerät:',
        geraetAuswaehlen:   '-- Gerät auswählen --',
        geraetWaehlen:      'Bitte ein Gerät aus der Liste wählen.',
        keineGeraete:       'Keine Tasmota-Geräte gefunden. Läuft der Adapter?',
        online:             'Online',
        offline:            'Offline',
        cmndTitel:          'Befehle (cmnd)',
        statTitel:          'Status (stat)',
        schluessel:         'Schlüssel',
        wert:               'Wert',
        aktionen:           'Aktionen',
        keineStaten:        'Keine Zustände vorhanden.',
        an:                 'AN',
        aus:                'AUS',
        fehler:             'Fehler:',
        befehlGesendet:     'Befehl gesendet',
    },
    en: {
        verbinde:           'Connecting…',
        verbunden:          'Connected',
        getrennt:           'Disconnected',
        socketFehler:       'Socket unavailable',
        authFehler:         'Auth failed',
        aktualisieren:      '⟳ Refresh',
        konfiguration:      '⚙ Configuration',
        geraet:             'Device:',
        geraetAuswaehlen:   '-- Select device --',
        geraetWaehlen:      'Please select a device from the list.',
        keineGeraete:       'No Tasmota devices found. Is the adapter running?',
        online:             'Online',
        offline:            'Offline',
        cmndTitel:          'Commands (cmnd)',
        statTitel:          'Status (stat)',
        schluessel:         'Key',
        wert:               'Value',
        aktionen:           'Actions',
        keineStaten:        'No states found.',
        an:                 'ON',
        aus:                'OFF',
        fehler:             'Error:',
        befehlGesendet:     'Command sent',
    },
};

let lang = 'en';

function detectLang() {
    try {
        const sysLang = window.parent?.sysConfig?.common?.language
            || window.parent?.systemLang
            || navigator.language || 'en';
        lang = sysLang.toLowerCase().startsWith('de') ? 'de' : 'en';
    } catch {
        lang = (navigator.language || 'en').toLowerCase().startsWith('de') ? 'de' : 'en';
    }
}

function t(key) {
    const tr = TRANSLATIONS[lang] || TRANSLATIONS.en;
    return tr[key] !== undefined ? tr[key] : (TRANSLATIONS.en[key] || key);
}

function translatePage() {
    for (const el of document.querySelectorAll('[data-i18n]')) {
        el.textContent = t(el.getAttribute('data-i18n'));
    }
    for (const el of document.querySelectorAll('[data-i18n-placeholder]')) {
        el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
    }
}

// ── Theme ─────────────────────────────────────────────────────────

const DARK_THEMES = ['dark', 'blue'];

function resolveTheme() {
    try {
        const th = localStorage.getItem('App.theme');
        if (th) return th === 'dark';
        const tn = localStorage.getItem('App.themeName');
        if (tn) return DARK_THEMES.includes(tn);
    } catch { /* storage blocked */ }

    try {
        const body = window.parent?.document?.body;
        const html = window.parent?.document?.documentElement;
        if (body) {
            if ((body.className  || '').toLowerCase().includes('dark')) return true;
            if ((html?.className || '').toLowerCase().includes('dark')) return true;
            if (body.getAttribute('data-theme') === 'dark') return true;
        }
    } catch { /* cross-origin */ }

    try {
        const p = window.parent;
        for (const el of [
            p?.document?.getElementById('root'),
            p?.document?.querySelector('.App'),
            p?.document?.body,
        ].filter(Boolean)) {
            const bg = p.getComputedStyle(el).backgroundColor;
            const m = bg && bg.match(/[\d.]+/g);
            if (m && m.length >= 3) {
                const a = m.length >= 4 ? parseFloat(m[3]) : 1;
                if (a > 0 && (parseInt(m[0]) + parseInt(m[1]) + parseInt(m[2])) / 3 < 80) return true;
            }
        }
    } catch { /* cross-origin */ }

    return false;
}

function applyTheme(isDark) { document.body.classList.toggle('dark', !!isDark); }

function detectTheme() {
    try {
        const params = new URLSearchParams(window.location.search);
        const react = params.get('react');
        if (react !== null) { applyTheme(DARK_THEMES.includes(react)); return; }
    } catch { /* ignore */ }
    applyTheme(resolveTheme());
}

function watchTheme() {
    window.addEventListener('storage', e => {
        if (e.key === 'App.theme') applyTheme(e.newValue === 'dark');
        else if (e.key === 'App.themeName') applyTheme(DARK_THEMES.includes(e.newValue));
    });
    window.addEventListener('message', e => {
        if (e.data === 'updateTheme') applyTheme(resolveTheme());
    });
    try {
        const targets = [
            window.parent?.document?.body,
            window.parent?.document?.documentElement,
        ].filter(Boolean);
        if (targets.length) {
            const obs = new MutationObserver(() => applyTheme(resolveTheme()));
            for (const el of targets) {
                obs.observe(el, { attributes: true, attributeFilter: ['class', 'data-theme', 'data-bs-theme', 'style'] });
            }
        }
    } catch { /* cross-origin */ }
    let _lastDark = document.body.classList.contains('dark');
    setInterval(() => {
        const isDark = resolveTheme();
        if (isDark !== _lastDark) { _lastDark = isDark; applyTheme(isDark); }
    }, 5000);
}

// ── Socket helpers ─────────────────────────────────────────────────

let socket    = null;
let namespace = null;       // e.g. 'tasmota.0'
let allDevices = [];        // array of device objects
let allStates  = {};        // map: stateId → {val, ack, ...}
let selectedDeviceShortId = null;

async function socketCall(method, ...args) {
    if (!socket) throw new Error('No socket');
    if (typeof socket[method] === 'function') return socket[method](...args);
    return new Promise((resolve, reject) => {
        socket.emit(method, ...args, (err, result) => {
            if (err) reject(typeof err === 'string' ? new Error(err) : err);
            else resolve(result);
        });
    });
}

async function getStatesPattern(pattern) {
    try { return await socketCall('getStates', pattern) || {}; } catch { return {}; }
}

// ── Socket init ────────────────────────────────────────────────────

function initSocket() {
    detectLang();
    detectTheme();
    watchTheme();
    translatePage();

    // Try Admin 7 React parent socket (polls up to 3 s)
    let attempts = 0;
    const check = () => {
        if (window.parent && window.parent.socket) {
            socket = window.parent.socket;
            onSocketConnected();
        } else if (attempts++ < 30) {
            setTimeout(check, 100);
        } else {
            // Fallback: load socket.io from Admin
            const s = document.createElement('script');
            s.src = '../../lib/js/socket.io.js';
            s.onload = () => connectSocketIO();
            s.onerror = () => setConnStatus(false, t('socketFehler'));
            document.head.appendChild(s);
        }
    };
    check();
}

function connectSocketIO() {
    const loc  = window.location;
    const path = loc.pathname.replace(/\/[^/]*$/, '/') + 'socket.io';
    const io   = window.io || window.socket_io;
    if (!io) { setConnStatus(false, t('socketFehler')); return; }
    socket = io.connect(loc.origin, { path, query: 'ws=true' });
    socket.on('connect', () => {
        socket.emit('authenticate', (err, isOk) => {
            if (isOk) onSocketConnected();
            else setConnStatus(false, t('authFehler'));
        });
    });
    socket.on('disconnect', () => setConnStatus(false, t('getrennt')));
}

function onSocketConnected() {
    setConnStatus(true, t('verbunden'));

    // Detect instance from URL param ?instance=N
    const urlParams = new URLSearchParams(window.location.search);
    const instNum = urlParams.get('instance') || '0';
    namespace = 'tasmota.' + instNum;

    // Live state changes
    if (typeof socket.on === 'function') {
        socket.on('stateChange', (id, state) => {
            if (namespace && id.startsWith(namespace + '.')) {
                handleStateChange(id, state);
            }
        });
    }

    refreshAll();
}

// ── Config button ──────────────────────────────────────────────────

function openConfig() {
    const urlParams = new URLSearchParams(window.location.search);
    const instNum = urlParams.get('instance') || '0';
    window.parent.location.href =
        window.location.origin + '/#tab-instances/config/system.adapter.tasmota.' + instNum;
}

// ── Connection status indicator ────────────────────────────────────

function setConnStatus(online, label) {
    const el = document.getElementById('connStatus');
    el.className = online ? 'online' : 'offline';
    document.getElementById('connLabel').textContent = label;
}

// ── Device loading ─────────────────────────────────────────────────

async function refreshAll() {
    if (!namespace) return;
    allDevices = [];
    allStates  = {};

    try {
        const view = await socketCall('getObjectView', 'system', 'device', {
            startkey: namespace + '.',
            endkey:   namespace + '.\u9999',
        });
        if (view && view.rows) {
            const nsDepth = namespace.split('.').length;
            for (const row of view.rows) {
                const obj = row.value;
                if (!obj) continue;
                // Only direct children of the namespace (one level deeper)
                if (obj._id.split('.').length === nsDepth + 1) {
                    allDevices.push(obj);
                }
            }
        }
    } catch (e) {
        console.error('loadDevices error:', e);
    }

    // Load all states at once
    if (allDevices.length > 0) {
        allStates = await getStatesPattern(namespace + '.*');
    }

    populateDropdown();
    renderDevice();
}

// ── Device dropdown ────────────────────────────────────────────────

function populateDropdown() {
    const select = document.getElementById('deviceSelect');
    const prev   = select.value;

    select.innerHTML = `<option value="">${t('geraetAuswaehlen')}</option>`;

    for (const dev of allDevices) {
        const shortId = dev._id.split('.').pop();
        const name    = dev.common?.name || shortId;
        const opt     = document.createElement('option');
        opt.value     = shortId;
        opt.textContent = (name !== shortId) ? `${name} (${shortId})` : name;
        if (shortId === prev) opt.selected = true;
        select.appendChild(opt);
    }

    // Sync selectedDeviceShortId unconditionally after dropdown repopulation
    selectedDeviceShortId = select.value || null;

    if (!allDevices.length) {
        document.getElementById('placeholder').textContent = t('keineGeraete');
    }
}

function onDeviceSelect() {
    const select = document.getElementById('deviceSelect');
    selectedDeviceShortId = select.value || null;
    renderDevice();
}

// ── Device detail rendering ────────────────────────────────────────

function renderDevice() {
    const detail      = document.getElementById('deviceDetail');
    const placeholder = document.getElementById('placeholder');

    if (!selectedDeviceShortId) {
        detail.style.display = 'none';
        placeholder.style.display = '';
        placeholder.textContent = allDevices.length
            ? t('geraetWaehlen')
            : t('keineGeraete');
        return;
    }

    const devicePrefix = namespace + '.' + selectedDeviceShortId + '.';

    // Collect cmnd and stat states only (ignore tele and others)
    const cmndStates = {};
    const statStates = {};

    for (const [id, st] of Object.entries(allStates)) {
        if (!id.startsWith(devicePrefix)) continue;
        const rel   = id.replace(devicePrefix, '');
        const parts = rel.split('.');
        if (parts[0] === 'cmnd' && parts.length > 1) {
            cmndStates[parts.slice(1).join('.')] = { id, val: st?.val };
        } else if (parts[0] === 'stat' && parts.length > 1) {
            statStates[parts.slice(1).join('.')] = { id, val: st?.val };
        }
    }

    renderStateSection('cmndBody', 'cmndTable', 'cmndEmpty', cmndStates, true);
    renderStateSection('statBody', 'statTable', 'statEmpty', statStates, false);

    placeholder.style.display = 'none';
    detail.style.display = '';

    updateDeviceStatus();
}

/**
 * Fill a state table with rows.
 *
 * @param {string} tbodyId   - tbody element ID
 * @param {string} tableId   - table element ID (hidden when empty)
 * @param {string} emptyId   - "no states" element ID
 * @param {Object} states    - map of key → {id, val}
 * @param {boolean} showActions - whether to render toggle buttons for boolean values
 */
function renderStateSection(tbodyId, tableId, emptyId, states, showActions) {
    const tbody = document.getElementById(tbodyId);
    const table = document.getElementById(tableId);
    const empty = document.getElementById(emptyId);

    tbody.innerHTML = '';

    const keys = Object.keys(states).sort();

    if (!keys.length) {
        table.style.display = 'none';
        empty.style.display = '';
        return;
    }

    table.style.display = '';
    empty.style.display = 'none';

    for (const key of keys) {
        const info = states[key];
        const tr   = document.createElement('tr');

        // Key cell
        const tdKey = document.createElement('td');
        tdKey.className  = 'td-key';
        tdKey.textContent = key;
        tr.appendChild(tdKey);

        // Value cell
        const tdVal = document.createElement('td');
        tdVal.className  = 'td-val';
        tdVal.textContent = fmtVal(info.val);
        tr.appendChild(tdVal);

        // Actions cell (cmnd section only)
        if (showActions) {
            const tdAct = document.createElement('td');
            tdAct.className = 'td-act';
            const val    = info.val;
            const valUC  = String(val).toUpperCase();
            const isBool = val === true || val === false
                || valUC === 'ON'
                || valUC === 'OFF';
            if (isBool) {
                const isOn  = val === true || valUC === 'ON';
                const tgl   = document.createElement('div');
                tgl.className = 'power-toggle';

                const btnOn  = document.createElement('button');
                btnOn.className  = 'btn-power on'  + (isOn  ? ' active-on'  : '');
                btnOn.textContent = t('an');
                btnOn.onclick = () => sendPower(info.id, true);

                const btnOff = document.createElement('button');
                btnOff.className  = 'btn-power off' + (!isOn ? ' active-off' : '');
                btnOff.textContent = t('aus');
                btnOff.onclick = () => sendPower(info.id, false);

                tgl.appendChild(btnOn);
                tgl.appendChild(btnOff);
                tdAct.appendChild(tgl);
            }
            tr.appendChild(tdAct);
        }

        tbody.appendChild(tr);
    }
}

// ── Device online status ───────────────────────────────────────────

function updateDeviceStatus() {
    if (!selectedDeviceShortId) return;
    const badge        = document.getElementById('deviceStatusBadge');
    const devicePrefix = namespace + '.' + selectedDeviceShortId + '.';
    let   isOnline     = null;

    // Look for any LWT state (in any channel) to determine online status
    for (const [id, st] of Object.entries(allStates)) {
        if (!id.startsWith(devicePrefix)) continue;
        if (id.split('.').pop().toLowerCase() !== 'lwt') continue;
        const v = st?.val;
        if (typeof v === 'boolean') { isOnline = v; break; }
        if (typeof v === 'string')  { isOnline = v.toLowerCase() === 'online'; break; }
    }

    if (isOnline !== null) {
        badge.style.display = '';
        badge.className  = 'online-badge ' + (isOnline ? 'online' : 'offline');
        badge.textContent = isOnline ? '● ' + t('online') : '○ ' + t('offline');
    } else {
        badge.style.display = 'none';
    }
}

// ── Power control ──────────────────────────────────────────────────

async function sendPower(stateId, value) {
    // Prefer the cmnd channel for commands (standard Tasmota convention)
    const relId    = stateId.replace(namespace + '.', '');  // e.g. mydevice.stat.POWER
    const parts    = relId.split('.');
    const shortDev = parts[0];
    const key      = parts[parts.length - 1];               // e.g. POWER
    const cmdId    = namespace + '.' + shortDev + '.cmnd.' + key;

    const writeId = (allStates[cmdId] !== undefined) ? cmdId : stateId;

    try {
        await socketCall('setState', writeId, { val: value, ack: false });
        showToast(t('befehlGesendet'));
    } catch (e) {
        showToast(t('fehler') + ' ' + (e.message || e), true);
    }
}

// ── Live state updates ─────────────────────────────────────────────

function handleStateChange(id, state) {
    if (!state) return;

    // Update in-memory cache
    allStates[id] = state;

    // Re-render only if the changed state belongs to the selected device
    const shortId = id.replace(namespace + '.', '').split('.')[0];
    if (shortId === selectedDeviceShortId) {
        renderDevice();
    }
}

// ── Helpers ────────────────────────────────────────────────────────

function fmtVal(val) {
    if (val === null || val === undefined) return '—';
    if (typeof val === 'boolean') return val ? '✔' : '✘';
    if (typeof val === 'number') {
        if (!Number.isFinite(val)) return '—';
        return val % 1 === 0 ? String(val) : val.toFixed(2);
    }
    return String(val);
}

let toastTimer = null;
function showToast(msg, isError) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = isError ? 'show error' : 'show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ── Boot ───────────────────────────────────────────────────────────
initSocket();
</script>
